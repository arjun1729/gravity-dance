<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Dance</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        body { background: #000; overflow: hidden; font-family: Arial; }
        canvas { display: block; width: 100%; height: 100%; background: #000011; }
        
        .controls {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); padding: 20px;
            border-radius: 8px; color: #0f0; z-index: 100;
            border: 2px solid #0f0;
        }
        
        button {
            display: block; width: 200px; padding: 10px;
            margin: 5px 0; background: #0f0; color: #000;
            border: none; border-radius: 4px; cursor: pointer;
            font-weight: bold;
        }
        
        button:hover { background: #0f0; opacity: 0.8; }
        
        .stats {
            position: fixed; top: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.8); color: #0f0;
            padding: 15px; border-radius: 8px; border: 2px solid #0f0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <h2 style="color: #0f0; margin-bottom: 10px;">GRAVITY DANCE</h2>
        <button onclick="loadSolarSystem()">☀️ Solar System</button>
        <button onclick="loadBinaryStars()">⭐ Binary Stars</button>
        <button onclick="loadGalaxyCollision()">🌀 Galaxies</button>
        <button onclick="loadChaosSystem()">💫 Chaos</button>
        <button onclick="clearBodies()">Clear</button>
        <p style="margin-top: 10px; font-size: 12px;">Click+drag to add bodies</p>
    </div>
    
    <div class="stats">
        <div>Bodies: <span id="count">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Force canvas to fill screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        const G = 100;
        let bodies = [];
        let paused = false;
        
        class Body {
            constructor(x, y, vx, vy, mass, color) {
                this.x = x; this.y = y;
                this.vx = vx; this.vy = vy;
                this.mass = mass;
                this.color = color;
                this.radius = Math.max(2, Math.sqrt(mass) / 30);
                this.trail = [];
            }
            
            applyForce(other) {
                const dx = other.x - this.x;
                const dy = other.y - this.y;
                const distSq = dx*dx + dy*dy;
                const dist = Math.sqrt(distSq);
                if (dist < 10) return;
                
                const force = (G * this.mass * other.mass) / (distSq + 100);
                const fx = force * dx / dist;
                const fy = force * dy / dist;
                
                this.vx += fx / this.mass;
                this.vy += fy / this.mass;
            }
            
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 100) this.trail.shift();
            }
            
            draw() {
                // Trail
                if (this.trail.length > 1) {
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 0.5;
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
                
                // Glow
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius*2);
                g.addColorStop(0, this.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius*2, 0, Math.PI*2);
                ctx.fill();
                
                // Body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function loadSolarSystem() {
            bodies = [];
            const cx = canvas.width/2, cy = canvas.height/2;
            bodies.push(new Body(cx, cy, 0, 0, 10000, '#FDB813'));
            bodies.push(new Body(cx+100, cy, 0, 8, 100, '#8C7853'));
            bodies.push(new Body(cx+140, cy, 0, 6, 200, '#FFC649'));
            bodies.push(new Body(cx+180, cy, 0, 5, 250, '#4A90E2'));
            bodies.push(new Body(cx+220, cy, 0, 4, 150, '#E27B58'));
            bodies.push(new Body(cx+300, cy, 0, 2.5, 500, '#C88B3A'));
        }
        
        function loadBinaryStars() {
            bodies = [];
            const cx = canvas.width/2, cy = canvas.height/2;
            bodies.push(new Body(cx-100, cy, 0, 3, 5000, '#00BFFF'));
            bodies.push(new Body(cx+100, cy, 0, -3, 5000, '#FF6B6B'));
            for (let i = 0; i < 20; i++) {
                const a = (i/20)*Math.PI*2, r = 120 + Math.random()*60;
                const x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r;
                const v = Math.sqrt(G*10000/r);
                bodies.push(new Body(x, y, -Math.sin(a)*v*0.7, Math.cos(a)*v*0.7, 50, '#90EE90'));
            }
        }
        
        function loadGalaxyCollision() {
            bodies = [];
            const cx = canvas.width/2, cy = canvas.height/2;
            makeGalaxy(cx-150, cy-100, 2, 1.5, '#FFD700');
            makeGalaxy(cx+150, cy+100, -2, -1.5, '#FF69B4');
        }
        
        function makeGalaxy(cx, cy, vx, vy, col) {
            bodies.push(new Body(cx, cy, vx, vy, 8000, col));
            for (let i = 0; i < 40; i++) {
                const a = Math.random()*Math.PI*2, r = 80 + Math.random()*100;
                const x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r;
                const v = Math.sqrt(G*8000/r);
                bodies.push(new Body(x, y, vx - Math.sin(a)*v*0.5, vy + Math.cos(a)*v*0.5, 80, col));
            }
        }
        
        function loadChaosSystem() {
            bodies = [];
            const cx = canvas.width/2, cy = canvas.height/2;
            const cols = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#FF8B94'];
            for (let i = 0; i < 25; i++) {
                bodies.push(new Body(
                    cx + (Math.random()-0.5)*400,
                    cy + (Math.random()-0.5)*400,
                    (Math.random()-0.5)*5,
                    (Math.random()-0.5)*5,
                    500,
                    cols[Math.floor(Math.random()*cols.length)]
                ));
            }
        }
        
        function clearBodies() { bodies = []; }
        
        let isDragging = false, dragX = 0, dragY = 0;
        canvas.addEventListener('mousedown', e => {
            dragX = e.clientX; dragY = e.clientY; isDragging = true;
        });
        canvas.addEventListener('mouseup', e => {
            if (isDragging) {
                bodies.push(new Body(dragX, dragY, (dragX-e.clientX)*0.02, (dragY-e.clientY)*0.02, 300, '#00FF00'));
            }
            isDragging = false;
        });
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { paused = !paused; e.preventDefault(); }
        });
        
        let frameCount = 0, lastTime = Date.now();
        
        function animate() {
            const now = Date.now();
            const dt = Math.min((now - lastTime) / 1000, 0.033);
            lastTime = now;
            
            if (!paused) {
                for (let i = 0; i < bodies.length; i++) {
                    for (let j = i+1; j < bodies.length; j++) {
                        bodies[i].applyForce(bodies[j]);
                        bodies[j].applyForce(bodies[i]);
                    }
                }
                for (let b of bodies) b.update(dt);
            }
            
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let b of bodies) b.draw();
            
            frameCount++;
            if (now - lastTime > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = now;
            }
            
            document.getElementById('count').textContent = bodies.length;
            
            requestAnimationFrame(animate);
        }
        
        loadSolarSystem();
        animate();
    </script>
</body>
</html>
